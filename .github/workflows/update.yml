name: Tägliches Depot-Update

on:
  schedule:
    # Börsentäglich 15:00 UTC = 17:00 MESZ (US-Markt geöffnet, Europa kurz vor Schluss)
    - cron: "0 15 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Depot aktualisieren
        run: python scripts/update.py

      - name: Änderungen committen
        run: |
          git config user.name "depot-bot"
          git config user.email "depot-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Depot-Update $(date -u +%F)"
          git push
